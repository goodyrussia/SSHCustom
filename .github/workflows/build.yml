name: Build v1.0.1

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"

jobs:
  # ── 1. Build Go daemon for Android arm64 ─────────────────────────────────
  build-daemon:
    name: Build v1.0.1 sshcustomd (arm64-android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: daemon/go.sum

      - name: Build v1.0.1 daemon
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        working-directory: daemon
        run: |
          mkdir -p ../module/bin
          go build -trimpath -buildvcs=false -ldflags="-s -w" -o ../module/bin/sshcustomd ./cmd/sshcustomd/

      - name: Verify binary
        run: |
          file module/bin/sshcustomd
          file module/bin/sshcustomd | grep -q "aarch64\|ARM aarch64" && echo "OK arm64"

      - uses: actions/upload-artifact@v4
        with:
          name: sshcustomd-arm64
          path: module/bin/sshcustomd

  # ── 2. Package Magisk module ZIP ─────────────────────────────────────────
  package-module:
    name: Package module ZIP
    runs-on: ubuntu-latest
    needs: [build-daemon]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sshcustomd-arm64
          path: module/bin/

      - name: Set version + permissions
        run: |
          chmod +x module/bin/sshcustomd
          VER=$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo '0.0.0')
          sed -i "s|^version=.*|version=v${VER}|" module/module.prop
          echo "VERSION=${VER}" >> "$GITHUB_ENV"

      - name: Package ZIP
        run: |
          mkdir -p dist
          cd module
          zip -r9 "../dist/SSHCustom-v${VERSION}.zip" . -x "*.DS_Store" -x "__MACOSX/*" -x "bin/.gitkeep"
          ls -lh "../dist/SSHCustom-v${VERSION}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: dist/SSHCustom-v${{ env.VERSION }}.zip

  # ── 3. Build Android APK (release, arm64-only) ───────────────────────────
  build-apk:
    name: Build v1.0.1 Android APK (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Generate release keystore
        run: |
          keytool -genkeypair -keystore /tmp/release.jks -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass sshcustom -keypass sshcustom \
            -dname "CN=SSHCustom, O=SSHCustom, C=US" -noprompt
          echo "SIGNING_KEY_PATH=/tmp/release.jks" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=sshcustom" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=release" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=sshcustom" >> "$GITHUB_ENV"

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: app

      - name: Build v1.0.1 release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: app
        env:
          SIGNING_KEY_PATH: /tmp/release.jks
          SIGNING_STORE_PASSWORD: sshcustom
          SIGNING_KEY_ALIAS: release
          SIGNING_KEY_PASSWORD: sshcustom

      - name: Stage APK
        run: |
          APK="app/build/outputs/apk/release/app-arm64-v8a-release.apk"
          [ -f "$APK" ] || APK=$(find app/build -name "*release*.apk" -type f 2>/dev/null | head -1)
          [ -z "$APK" ] && { echo "FATAL: no APK"; exit 1; }
          cp "$APK" SSHCustom-release.apk
          ls -lh SSHCustom-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: SSHCustom-release.apk

  # ── 4. Create GitHub Release (tags only) ─────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-module, build-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: module-zip
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: dist/

      - name: List assets
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SSHCustom ${{ github.ref_name }}"
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            dist/*.zip
            dist/*.apk
          body: |
            ## SSHCustom ${{ github.ref_name }}
            ### Installation
            1. Flash the ZIP via Magisk / KernelSU / APatch
            2. Reboot
            3. Install the APK
            4. Open app → grant root → configure SSH → Start

            ### Features
            - SSH-only routing: REDIRECT, TPROXY, TUN modes
            - SOCKS5 + DNS tunnel + captive portal bypass
            - Companion app with SSH profile management
            - Static arm64 binary, CGO_ENABLED=0
