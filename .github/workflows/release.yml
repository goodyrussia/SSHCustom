name: Release

on:
  push:
    tags: ['v5.*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: |
          cd daemon
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../module/bin/arm64-v8a/sshcustomd ./cmd/sshcustomd
          cd ..
          chmod +x build.sh
          ./build.sh
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SSHCustom-v5.0.0.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
