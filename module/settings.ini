#!/system/bin/sh
# SSHCustom Settings
# ════════════════════════════════════════════════════════
# Do NOT edit while service is running.
# All changes take effect on next start/restart.
# ════════════════════════════════════════════════════════

# ── Bootstrap: ensure busybox is available ────────────────
if ! command -v busybox >/dev/null 2>&1; then
  export PATH="/data/adb/magisk:/data/adb/ksu/bin:/data/adb/ap/bin:$PATH:/system/bin"
fi

# ── Paths (do not modify) ─────────────────────────────────
box_dir="/data/adb/sshcustom"
box_run="${box_dir}/run"
box_log="${box_run}/sshcustom.log"
box_pid="${box_run}/sshcustom.pid"
bin_dir="${box_dir}/bin"
box_run_state="${box_run}/state"

mkdir -p "${box_run}" "${box_run_state}" >/dev/null 2>&1 || true

# ── SSH Connection ─────────────────────────────────────────
ssh_host=""
ssh_port="22"
ssh_user=""
ssh_password=""

# SSH transport mode: direct | sni | sni_http_proxy
ssh_mode="direct"

# SNI hostname — carrier bypass (sni / sni_http_proxy modes)
ssh_sni_host=""

# HTTP proxy (sni_http_proxy mode only)
http_proxy_host=""
http_proxy_port="3128"

# Payload injection
# Paste raw payload string — variables: [host] [port] [cr] [lf] [crlf]
payload_enabled="false"
payload=""

# ── Traffic Interception ───────────────────────────────────
# network_mode: tproxy (TPROXY-only as of v1.0.1)
network_mode="tproxy"

# Ports changed from box defaults (9898/1080) to avoid conflict
# if box module is also installed on the same device.
socks_port="1081"
tproxy_port="9899"

# ── Proxy Behaviour ───────────────────────────────────────
proxy_tcp="true"
proxy_udp="false"

# QUIC: disable = block UDP 443/80 (forces TCP fallback through tunnel)
#        enable  = allow QUIC
quic="disable"

# ── DNS ───────────────────────────────────────────────────
# DNS always routed through tunnel via dns_forward (UDP:53 → 127.0.0.1:5353)

# ── Speed Boost ───────────────────────────────────────────
channel_pool="true"
channel_pool_size="8"
tcp_buffer_tuning="true"

# ── IPv6 ──────────────────────────────────────────────────
# false = disable IPv6 system-wide while tunnel is active (recommended)
ipv6="false"

# ── Hotspot sharing ────────────────────────────────────────
# When true, hotspot clients are also routed through the SSH tunnel.
# hotspot_sharing removed — TPROXY mode handles hotspot clients natively

# ── cgroup blkio ──────────────────────────────────────────
cgroup_blkio="true"
blkio_weight="900"

# ── Module metadata ───────────────────────────────────────
module_prop="/data/adb/modules/sshcustom/module.prop"

# ── Logging ───────────────────────────────────────────────
# log() is called with current_time evaluated at call time (not source time)
log() {
  local level="$1"
  shift
  # Re-evaluate time on every call so timestamps are accurate
  local _ts
  _ts="$(date '+%H:%M')"
  local msg="${_ts} [${level}]: $*"
  if [ -t 1 ]; then
    printf '%s\n' "${msg}"
  else
    printf '%s\n' "${msg}" >> "${box_log}"
  fi
}
