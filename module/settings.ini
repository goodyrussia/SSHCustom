# SSHCustom Daemon Settings
# TPROXY is the only supported network mode.

# ── SSH Connection ─────────────────────────────────────────────
SSH_HOST=""
SSH_PORT="22"
SSH_USER="root"
SSH_PASS=""
SSH_MODE="direct"           # direct | sni | sni_http_proxy
SSH_SNI_HOST=""

# ── HTTP Proxy (for sni_http_proxy mode) ───────────────────────
HTTP_PROXY_HOST=""
HTTP_PROXY_PORT="3128"

# ── Payload injection ──────────────────────────────────────────
PAYLOAD_ENABLED="false"
PAYLOAD=""
PAYLOAD_INJECTION_TYPE="normal"   # normal | front | back

# ── Network ─────────────────────────────────────────────────────
NETWORK_MODE="tproxy"         # tproxy only — no redirect/tun

# ── Local listeners ────────────────────────────────────────────
SOCKS_PORT="1081"               # SOCKS5 port
TPROXY_PORT="9899"              # transparent proxy port

# ── DNS ────────────────────────────────────────────────────────
DNS_UPSTREAM="8.8.8.8"
DNS_FORWARD_PORT="5353"

# ── Performance ─────────────────────────────────────────────────
KEEPALIVE_INTERVAL="10"
KEEPALIVE_MAX_MISSES="3"

# ── Hotspot ────────────────────────────────────────────────────
HOTSPOT_TCP="true"
HOTSPOT_UDP="true"

# ── Module ──────────────────────────────────────────────────────
MODULE_PROP="/data/adb/modules/sshcustom/module.prop"
